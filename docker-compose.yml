version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: winebook-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    command: --auth
    networks:
      - winebook-network

  api:
    build: ./api
    container_name: winebook-api
    restart: always
    ports:
      - "9000:9000"
    environment:
      - DB_HOST=mongodb
      - DB_PORT=27017
      - DB_NAME=${MONGO_DB_NAME}
      - DB_USER=${MONGO_DB_USER}
      - DB_PASSWORD=${MONGO_DB_PASSWORD}
      - TOKEN_KEY=${JWT_TOKEN_KEY}
    volumes:
      - ./api:/app
    command: npm run dev
    depends_on:
      - mongodb
    networks:
      - winebook-network

  client:
    build: ./client
    container_name: winebook-client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:9000
    depends_on:
      - api
    networks:
      - winebook-network

volumes:
  mongo-data:

networks:
  winebook-network:
    driver: bridge